name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Verify tag matches VERSION_NAME
        run: |
          VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag v$TAG does not match VERSION_NAME=$VERSION in gradle.properties" >&2
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify
        run: ./gradlew build detekt apiCheck koverVerify :quill-android:koverVerifyDebug

      # Uploads signed artifacts to the Central Portal as a deployment awaiting manual
      # release from central.sonatype.com (publishing to Maven Central is irreversible).
      # --no-configuration-cache: publishing releases to Maven Central is not yet
      # compatible with the configuration cache (gradle/gradle#22779).
      - name: Upload to Maven Central Portal
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
