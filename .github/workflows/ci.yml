name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: Build, test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, run unit tests and lint
        run: ./gradlew build lint koverXmlReport :quill-android:koverXmlReportDebug :quill-android:koverVerifyDebug

      - name: Static analysis (detekt)
        run: ./gradlew detekt

      - name: API compatibility check
        run: ./gradlew apiCheck

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: quill-core/build/reports/kover/report.xml,quill-android/build/reports/kover/reportDebug.xml,quill-conduit/build/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
